<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0F172A">
  <title>登录 · 智识花园</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="login">

  <!-- Aurora Background -->
  <div class="aurora-bg" aria-hidden="true">
    <span></span>
  </div>

  <!-- Top Nav (simplified for login) -->
  <nav class="nav" aria-label="主导航">
    <div class="nav-inner">
      <a href="index.html" class="nav-brand">
        <span class="nav-brand-mark">智</span>
        <span>智识花园</span>
      </a>
      <div class="nav-actions">
        <button class="nav-icon-btn" data-theme-toggle aria-label="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <a href="index.html" class="nav-icon-btn" aria-label="返回首页">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- Login Card -->
  <div class="login-wrap">
    <div class="login-card glass-strong">
      <div class="login-logo" aria-hidden="true">智</div>
      <h1 class="login-title">欢迎回来</h1>
      <p class="login-subtitle">登录以访问你的笔记和灵感空间</p>

      <form action="index.html" method="get">
        <div class="field">
          <label for="username" class="field-label">用户名</label>
          <input
            id="username"
            name="username"
            type="text"
            class="input"
            placeholder="请输入用户名"
            autocomplete="username"
            required
          >
        </div>

        <div class="field">
          <label for="password" class="field-label">密码</label>
          <input
            id="password"
            name="password"
            type="password"
            class="input"
            placeholder="请输入密码"
            autocomplete="current-password"
            required
          >
        </div>

        <div class="login-options">
          <label class="checkbox">
            <input type="checkbox" name="remember">
            <span class="checkbox-mark"></span>
            <span>记住我</span>
          </label>
          <a href="#">忘记密码？</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          <span>登录</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 5l7 7m0 0l-7 7m7-7H3"/>
          </svg>
        </button>
      </form>

      <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--glass-border); text-align: center; font-size: 0.875rem; color: var(--text-muted);">
        这是单用户站点 · 演示原型，任意账号密码可进入
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
